<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="ArrowJS component stability demo"
    />
    <link rel="stylesheet" type="text/css" href="/css/index.css" />
    <link rel="stylesheet" type="text/css" href="/demos/demo-nav.css" />
    <style>
      body {
        margin: 0;
        padding: 0 0 3rem;
      }

      .stability-shell {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1.25rem 0;
      }

      .stability-shell h1 {
        margin: 0 0 0.5rem;
      }

      .stability-shell p {
        max-width: 64ch;
        line-height: 1.5;
      }

      .stability-grid {
        display: grid;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .stability-card {
        border: 1px solid #d9dce7;
        border-radius: 16px;
        padding: 1rem;
        background: linear-gradient(180deg, #ffffff, #f7f8fc);
        box-shadow: 0 12px 32px rgba(13, 20, 33, 0.06);
      }

      .stability-card h2,
      .stability-card h3 {
        margin: 0 0 0.5rem;
      }

      .stability-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin: 0.75rem 0 1rem;
      }

      .stability-controls button {
        border: 0;
        border-radius: 999px;
        padding: 0.65rem 0.95rem;
        font: inherit;
        background: #111827;
        color: #fff;
        cursor: pointer;
      }

      .stability-meta {
        display: grid;
        gap: 0.35rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.95rem;
      }

      .stability-note {
        margin-top: 1rem;
        padding: 0.9rem 1rem;
        border-radius: 12px;
        background: #eef4ff;
      }

      .stability-badge {
        display: inline-block;
        margin: 0 0.5rem 0.5rem 0;
        padding: 0.25rem 0.55rem;
        border-radius: 999px;
        background: #e7ecff;
        font-size: 0.85rem;
      }
    </style>
    <title>ArrowJS • Component Stability Demo</title>
  </head>
  <body>
    <nav id="demo-nav"></nav>
    <main class="stability-shell">
      <h1>Component Stability Demo</h1>
      <p>
        Each level below is a stateful <code>component()</code>. The parent and
        grandparent both rerender and can change surrounding shape. The leaf has
        its own mutable local state. Instance ids should stay stable until a
        slot is actually removed.
      </p>
      <div id="demo-root"></div>
    </main>
    <script type="module" src="components/component-stability.js"></script>
    <script type="module" src="components/demos.js"></script>
  </body>
</html>
